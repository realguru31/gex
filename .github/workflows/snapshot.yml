name: GEXdon Snapshot Worker

on:
  schedule:
    # Every 15 min during RTH to maximize chance of capturing all 30-min buckets.
    # GitHub Actions cron can delay/skip runs, so 15-min intervals give 2 chances per bucket.
    # 14:00-21:00 UTC = 9:00-16:00 ET (covers A through N periods)
    # Worker deduplicates: if a bucket's snapshot exists, it skips.
    - cron: '0,15,30,45 14,15,16,17,18,19,20 * * 1-5'
  workflow_dispatch:  # Allow manual trigger for testing

jobs:
  snapshot:
    runs-on: ubuntu-latest
    # Skip on US market holidays (best-effort: skip if market closed)
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -q requests pandas numpy scipy pytz plotly
          pip install -q git+https://github.com/rongardF/tvdatafeed.git

      - name: Run snapshot worker
        working-directory: gexdonindex
        run: python snapshot_worker.py

      - name: Commit and push snapshots
        run: |
          cd gexdonindex
          git config user.name "GEXdon Bot"
          git config user.email "gexdon-bot@users.noreply.github.com"
          git add data/snapshots/
          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No new snapshots to commit"
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "📸 Snapshot: ${TIMESTAMP}"
            git push
          fi
